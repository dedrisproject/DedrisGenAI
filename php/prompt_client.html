<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prompt API Client</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        main {
            max-width: 720px;
            margin: 3rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
        }

        p.description {
            color: #555;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            outline: none;
        }

        button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #2563eb;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background-color: #eef2ff;
            border: 1px solid #c7d2fe;
            color: #1e3a8a;
            font-family: ui-monospace, SFMono-Regular, SFMono-Medium, "Roboto Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            white-space: pre-wrap;
        }

        .status.error {
            background-color: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .status.hidden {
            display: none;
        }
    </style>
</head>
<body>
<main>
    <h1>Prompt API Client</h1>
    <p class="description">Invia un prompt al demone PHP in ascolto e visualizza la risposta JSON restituita dall'endpoint <code>/execute</code>.</p>

    <form id="prompt-form">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" name="prompt" placeholder="Scrivi qui il tuo prompt" required></textarea>
        <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: center;">
            <button type="submit" id="submit-btn">Invia prompt</button>
            <span id="form-status" aria-live="polite"></span>
        </div>
    </form>

    <pre id="result" class="status hidden"></pre>
</main>

<script>
    const form = document.getElementById('prompt-form');
    const promptInput = document.getElementById('prompt');
    const submitBtn = document.getElementById('submit-btn');
    const resultBox = document.getElementById('result');
    const statusLabel = document.getElementById('form-status');

    const API_BASE_URL = (window.API_BASE_URL || 'http://127.0.0.1:9001');

    function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        statusLabel.textContent = isLoading ? 'Invio in corso…' : '';
    }

    function showResult(content, isError = false) {
        resultBox.textContent = content;
        resultBox.classList.remove('hidden');
        resultBox.classList.toggle('error', isError);
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const prompt = promptInput.value.trim();
        if (!prompt) {
            showResult('Inserisci un prompt valido.', true);
            return;
        }

        setLoading(true);
        showResult('');

        try {
            const response = await fetch(`${API_BASE_URL}/execute`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ prompt }),
            });

            const text = await response.text();
            let formatted;
            try {
                formatted = JSON.stringify(JSON.parse(text), null, 2);
            } catch (_) {
                formatted = text;
            }

            if (!response.ok) {
                showResult(`Errore (${response.status}):\n${formatted}`, true);
            } else {
                showResult(formatted, false);
            }
        } catch (error) {
            showResult(`Errore di rete: ${error instanceof Error ? error.message : String(error)}`, true);
        } finally {
            setLoading(false);
        }
    });
</script>
</body>
</html>
